# GitHub Actions: 每小时从金山文档同步数据
name: Sync from KDocs

on:
  schedule:
    - cron: '0 * * * *'  # 每小时整点运行
  workflow_dispatch:       # 支持手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openpyxl requests

      - name: Fetch data from KDocs and update JSON
        env:
          KDOCS_CLIENT_ID: ${{ secrets.KDOCS_CLIENT_ID }}
          KDOCS_CLIENT_SECRET: ${{ secrets.KDOCS_CLIENT_SECRET }}
          KDOCS_FILE_TOKEN: cahOpefqdPr3
        run: python sync.py

      - name: Commit and push if changed
        run: |
          git config user.name "Auto Sync"
          git config user.email "sync@bot"
          git add data.json
          git diff --staged --quiet || git commit -m "🔄 auto sync $(date +'%Y-%m-%d %H:%M')"
          git push
