name: Sync from Gist

on:
  schedule:
    - cron: '*/30 * * * *'  # 每30分钟检查一次
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest data from Gist
        run: |
          curl -sL "https://gist.githubusercontent.com/DWnana/4c7d8f6a11b47b5645cae1351235ce07/raw/c388f551b567ea07f53a3044ebd7ad106170ab9b/furniture-data.json" -o data.json
          if git diff --quiet data.json; then
            echo "No changes"
          else
            git config user.name "Auto Sync"
            git config user.email "sync@bot"
            git add data.json
            git commit -m "🔄 sync $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
