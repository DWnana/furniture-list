<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家具采购清单 — 动态管理</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fbfbfd;--card:#fff;--text:#1d1d1f;--text2:#86868b;--text3:#afafb2;
  --blue:#0071e3;--blue-h:#0077ed;--green:#34c759;--orange:#ff9500;--red:#ff3b30;--purple:#5856d6;
  --gray:#f5f5f7;--border:#d2d2d7;--border2:#e8e8ed;
  --shadow:0 4px 20px rgba(0,0,0,.06);--shadow2:0 12px 40px rgba(0,0,0,.08);
  --r:18px;--r2:12px;--r3:8px;--t:.3s cubic-bezier(.25,.1,.25,1);
}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased}

nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(251,251,253,.72);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--border2);height:52px;display:flex;align-items:center;justify-content:center}
nav .inner{width:100%;max-width:1200px;padding:0 32px;display:flex;align-items:center;justify-content:space-between}
nav .logo{font-size:18px;font-weight:600}nav .logo span{color:var(--blue)}
nav .links{display:flex;gap:20px;align-items:center}
nav .links a{font-size:13px;color:var(--text2);text-decoration:none;font-weight:500;transition:color var(--t)}
nav .links a:hover{color:var(--text)}

.refresh-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:980px;border:none;background:var(--blue);color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:all var(--t);font-family:inherit}
.refresh-btn:hover{background:var(--blue-h);transform:scale(1.02)}
.refresh-btn:active{transform:scale(0.98)}
.refresh-btn.loading{opacity:.7;pointer-events:none}
.refresh-btn .icon{display:inline-block;transition:transform .6s}
.refresh-btn.loading .icon{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.sync-status{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text3)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green)}
.sync-dot.error{background:var(--red)}.sync-dot.loading{background:var(--orange);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.hero{padding:140px 32px 80px;text-align:center;background:linear-gradient(180deg,#fbfbfd,#f5f5f7)}
.hero h1{font-size:clamp(40px,7vw,72px);font-weight:700;letter-spacing:-.04em;line-height:1.05;background:linear-gradient(135deg,#1d1d1f,#6e6e73);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:16px}
.hero .sub{font-size:clamp(18px,2.5vw,24px);color:var(--text2);font-weight:500;margin-bottom:12px}
.hero .meta{font-size:13px;color:var(--text3);margin-bottom:48px;display:flex;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap}

.stats{display:flex;justify-content:center;gap:48px;flex-wrap:wrap;padding:0 32px;margin-bottom:80px}
.stat{text-align:center}.stat .val{font-size:clamp(36px,5vw,56px);font-weight:700;letter-spacing:-.03em;line-height:1.1}.stat .val.blue{color:var(--blue)}.stat .lbl{font-size:14px;color:var(--text2);margin-top:4px;font-weight:500}

.sec{max-width:1200px;margin:0 auto;padding:0 32px 100px}
.sec-hd{text-align:center;margin-bottom:56px}.sec-hd h2{font-size:clamp(28px,4vw,48px);font-weight:700;letter-spacing:-.03em;margin-bottom:12px}.sec-hd p{font-size:18px;color:var(--text2);font-weight:500}

.filter{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:40px}
.fbtn{padding:8px 20px;border-radius:980px;border:1.5px solid var(--border);background:var(--card);color:var(--text2);font-size:14px;font-weight:500;cursor:pointer;transition:all var(--t);font-family:inherit}
.fbtn:hover{border-color:var(--text3);color:var(--text)}.fbtn.on{background:var(--text);color:#fff;border-color:var(--text)}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px}
.card{background:var(--card);border-radius:var(--r);padding:32px;border:1px solid var(--border2);transition:all var(--t);position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--blue);transform:scaleX(0);transform-origin:left;transition:transform var(--t)}
.card:hover{box-shadow:var(--shadow2);transform:translateY(-2px);border-color:transparent}
.card:hover::before{transform:scaleX(1)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
.cat{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--blue);background:rgba(0,113,227,.08);padding:4px 12px;border-radius:980px}
.pri{font-size:11px;font-weight:600;padding:3px 10px;border-radius:980px}
.pri.high{background:rgba(255,59,48,.1);color:var(--red)}.pri.mid{background:rgba(255,149,0,.1);color:var(--orange)}.pri.low{background:rgba(52,199,89,.1);color:var(--green)}
.card-name{font-size:22px;font-weight:600;letter-spacing:-.2px;margin-bottom:4px}
.card-brand{font-size:14px;color:var(--text2);margin-bottom:20px}
.card-st{display:flex;gap:16px;margin-bottom:16px}
.stag{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;color:var(--text2)}
.stag .dot{width:8px;height:8px;border-radius:50%;background:var(--border)}
.stag.done .dot{background:var(--green)}.stag.done{color:var(--green)}
.card-prices{display:flex;align-items:baseline;gap:12px;margin-bottom:20px}
.price{font-size:32px;font-weight:700;letter-spacing:-.03em}
.price-orig{font-size:16px;color:var(--text3);text-decoration:line-through}
.price-save{font-size:13px;font-weight:600;color:var(--green);background:rgba(52,199,89,.08);padding:3px 10px;border-radius:980px}
.card-note{margin-top:16px;padding:12px 16px;background:var(--gray);border-radius:var(--r3);font-size:13px;color:var(--text2)}
.card-link{display:inline-flex;align-items:center;gap:4px;margin-top:16px;font-size:14px;font-weight:500;color:var(--blue);text-decoration:none;transition:all var(--t)}
.card-link:hover{color:var(--blue-h);text-decoration:underline}.card-link svg{width:14px;height:14px}

.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.pcard{background:var(--card);border-radius:var(--r2);padding:24px;border:1.5px dashed var(--border);transition:all var(--t)}
.pcard:hover{border-color:var(--blue);border-style:solid;box-shadow:var(--shadow)}
.picon{width:40px;height:40px;border-radius:10px;background:rgba(0,113,227,.08);display:flex;align-items:center;justify-content:center;margin-bottom:16px;font-size:20px}
.ptitle{font-size:18px;font-weight:600;margin-bottom:6px}.pdesc{font-size:14px;color:var(--text2)}

.tl{position:relative;max-width:800px;margin:0 auto}
.tl::before{content:'';position:absolute;left:24px;top:0;bottom:0;width:2px;background:linear-gradient(180deg,var(--blue),var(--border2))}
.tl-g{margin-bottom:48px}.tl-gt{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--blue);margin-bottom:20px;padding-left:56px}
.tl-i{display:flex;align-items:flex-start;gap:20px;padding:16px 0}
.tl-dot{width:12px;height:12px;border-radius:50%;background:var(--card);border:3px solid var(--blue);flex-shrink:0;margin-top:4px;position:relative;left:19px;z-index:1}
.tl-c{background:var(--card);border-radius:var(--r2);padding:20px 24px;border:1px solid var(--border2);flex:1;margin-left:12px;transition:all var(--t)}.tl-c:hover{box-shadow:var(--shadow)}
.tl-t{font-size:16px;font-weight:600;margin-bottom:4px}.tl-n{font-size:13px;color:var(--text2)}

.tw{overflow-x:auto;border-radius:var(--r);border:1px solid var(--border2);background:var(--card)}
table{width:100%;border-collapse:collapse;font-size:14px}
th{padding:16px 20px;text-align:left;font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);background:var(--gray);border-bottom:1px solid var(--border2);white-space:nowrap}
td{padding:14px 20px;border-bottom:1px solid var(--border2);white-space:nowrap}
tr:last-child td{border-bottom:none}tr:hover{background:rgba(0,113,227,.03)}
.pc{font-weight:600;font-variant-numeric:tabular-nums}.lc a{color:var(--blue);text-decoration:none;font-weight:500}.lc a:hover{text-decoration:underline}

.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.scard{background:var(--card);border-radius:var(--r2);padding:24px;border:1px solid var(--border2);transition:all var(--t)}.scard:hover{box-shadow:var(--shadow);transform:translateY(-2px)}
.stag2{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;padding:4px 10px;border-radius:980px;display:inline-block;margin-bottom:12px}
.stag2.price{background:rgba(52,199,89,.1);color:var(--green)}.stag2.bundle{background:rgba(255,149,0,.1);color:var(--orange)}.stag2.logistics{background:rgba(0,113,227,.1);color:var(--blue)}.stag2.eco{background:rgba(88,86,214,.1);color:var(--purple)}.stag2.warranty{background:rgba(255,59,48,.1);color:var(--red)}
.stxt{font-size:15px;font-weight:500;line-height:1.5}

.empty{text-align:center;padding:80px 32px;color:var(--text2)}.empty h3{font-size:24px;font-weight:600;margin-bottom:12px;color:var(--text)}.empty p{font-size:16px;margin-bottom:24px}

footer{text-align:center;padding:60px 32px;border-top:1px solid var(--border2);color:var(--text3);font-size:13px}

.ai{opacity:0;transform:translateY(30px);transition:opacity .6s cubic-bezier(.25,.1,.25,1),transform .6s cubic-bezier(.25,.1,.25,1)}.ai.vis{opacity:1;transform:translateY(0)}

/* Config panel */
.config-panel{position:fixed;bottom:20px;right:20px;z-index:200;background:var(--card);border-radius:var(--r2);padding:20px;box-shadow:var(--shadow2);border:1px solid var(--border2);width:360px;display:none}
.config-panel.show{display:block}
.config-panel h4{font-size:14px;font-weight:600;margin-bottom:12px}
.config-panel label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px;margin-top:10px}
.config-panel input{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:var(--r3);font-size:13px;font-family:inherit;outline:none}
.config-panel input:focus{border-color:var(--blue)}
.config-panel .btns{display:flex;gap:8px;margin-top:16px}
.config-panel .btns button{flex:1;padding:8px;border-radius:980px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.config-panel .btns .btn-primary{background:var(--blue);color:#fff}
.config-panel .btns .btn-secondary{background:var(--gray);color:var(--text)}

.settings-btn{width:32px;height:32px;border-radius:50%;border:none;background:var(--gray);color:var(--text2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--t)}
.settings-btn:hover{background:var(--border);color:var(--text)}

@media(max-width:768px){nav .links a:not(.refresh-btn){display:none}.stats{gap:32px}.grid{grid-template-columns:1fr}.sec{padding:0 20px 80px}.hero{padding:120px 20px 60px}.config-panel{width:calc(100vw - 40px)}}
</style>
</head>
<body>

<nav>
  <div class="inner">
    <div class="logo">🏠 <span>Furnish</span></div>
    <div class="links">
      <a href="#products">采购清单</a>
      <a href="#pending">待选品</a>
      <a href="#timeline">时间线</a>
      <a href="#prices">价格监控</a>
      <a href="#suggestions">改进建议</a>
      <button class="refresh-btn" id="refreshBtn" onclick="refreshData()">
        <span class="icon">↻</span> 刷新数据
      </button>
      <button class="settings-btn" onclick="toggleConfig()" title="数据源设置">⚙</button>
    </div>
  </div>
</nav>

<section class="hero">
  <h1 id="title">家具采购清单</h1>
  <p class="sub" id="subtitle">智能管理 · 实时追踪 · 精明采购</p>
  <div class="meta">
    <div class="sync-status">
      <span class="sync-dot" id="syncDot"></span>
      <span id="syncText">等待加载...</span>
    </div>
    <span>·</span>
    <span>最后更新: <b id="lastUpdate">—</b></span>
  </div>
  <div class="stats">
    <div class="stat ai"><div class="val blue" id="s-items">0</div><div class="lbl">已选品</div></div>
    <div class="stat ai"><div class="val" id="s-orig">¥0</div><div class="lbl">官方指导价</div></div>
    <div class="stat ai"><div class="val blue" id="s-target">¥0</div><div class="lbl">预估到手价</div></div>
    <div class="stat ai"><div class="val" id="s-save">¥0</div><div class="lbl">预计节省</div></div>
  </div>
</section>

<section class="sec" id="products">
  <div class="sec-hd ai"><h2>采购清单</h2><p>全部已选家具，实时价格追踪</p></div>
  <div class="filter ai" id="filterBar"></div>
  <div class="grid" id="productGrid"></div>
</section>

<section class="sec" id="pending">
  <div class="sec-hd ai"><h2>待选品</h2><p>还需要确定具体产品的品类</p></div>
  <div class="pgrid" id="pendingGrid"></div>
</section>

<section class="sec" id="timeline">
  <div class="sec-hd ai"><h2>采购时间线</h2><p>配合装修进度，分阶段采购</p></div>
  <div class="tl" id="timelineContent"></div>
</section>

<section class="sec" id="prices">
  <div class="sec-hd ai"><h2>价格监控</h2><p>记录价格变动，把握最佳购买时机</p></div>
  <div class="tw ai"><table><thead><tr><th>品类</th><th>品牌/型号</th><th>价格</th><th>来源</th><th>备注</th></tr></thead><tbody id="priceBody"></tbody></table></div>
</section>

<section class="sec" id="suggestions">
  <div class="sec-hd ai"><h2>改进建议</h2><p>基于清单分析，自主生成的优化建议</p></div>
  <div class="sgrid" id="suggestGrid"></div>
</section>

<footer><p>家具采购清单 · 动态管理 · 数据联动</p></footer>

<!-- Config Panel -->
<div class="config-panel" id="configPanel">
  <h4>⚙ 数据源设置</h4>
  <label>JSON 数据地址</label>
  <input type="text" id="cfgUrl" placeholder="https://your-server.com/data.json 或 /api/data">
  <div class="btns">
    <button class="btn-secondary" onclick="toggleConfig()">取消</button>
    <button class="btn-primary" onclick="saveConfig()">保存并刷新</button>
  </div>
</div>

<script>
// ============================================================
// CONFIG: Change this URL to your data source
// Options:
//   1. Backend API:     '/api/data'
//   2. GitHub Gist:     'https://gist.githubusercontent.com/user/id/raw/file.json'
//   3. Any public URL:  'https://your-server.com/furniture-data.json'
//   4. Local file:      './furniture-data.json' (needs web server)
// ============================================================
const DEFAULT_DATA_URL = 'https://raw.githubusercontent.com/DWnana/furniture-list/main/data.json';

let DATA_URL = localStorage.getItem('furniture_data_url') || DEFAULT_DATA_URL;
let DATA = null;
const fmt = n => '¥' + n.toLocaleString('zh-CN');
const priMap = {high:'高',mid:'中',low:'低'};

// ========== Config ==========
function toggleConfig() {
  const panel = document.getElementById('configPanel');
  panel.classList.toggle('show');
  if (panel.classList.contains('show')) {
    document.getElementById('cfgUrl').value = DATA_URL;
    document.getElementById('cfgUrl').focus();
  }
}

function saveConfig() {
  const url = document.getElementById('cfgUrl').value.trim();
  if (!url) return;
  DATA_URL = url;
  localStorage.setItem('furniture_data_url', url);
  toggleConfig();
  refreshData();
}

// ========== Data Loading ==========
async function loadData(showLoading = true) {
  const btn = document.getElementById('refreshBtn');
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncText');

  if (showLoading) {
    btn.classList.add('loading');
    dot.className = 'sync-dot loading';
    txt.textContent = '正在同步...';
  }

  try {
    const resp = await fetch(DATA_URL + (DATA_URL.includes('?') ? '&' : '?') + 't=' + Date.now());
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    DATA = await resp.json();

    dot.className = 'sync-dot';
    txt.textContent = `已同步 · ${DATA.products?.length || 0} 件商品`;
    renderAll();
  } catch (err) {
    console.error('Load failed:', err);
    dot.className = 'sync-dot error';
    txt.textContent = '同步失败: ' + err.message;
    if (!DATA) renderEmpty();
  } finally {
    btn.classList.remove('loading');
  }
}

async function refreshData() {
  // If using backend, trigger server-side refresh
  if (DATA_URL.includes('/api/')) {
    try { await fetch('/api/refresh', { method: 'POST' }); } catch (e) {}
  }
  await loadData(true);
}

// ========== Renderers ==========
function renderAll() {
  if (!DATA) return;
  const m = DATA.meta || {};
  document.getElementById('title').textContent = m.title || '家具采购清单';
  document.getElementById('subtitle').textContent = m.subtitle || '';
  document.getElementById('lastUpdate').textContent = m.lastUpdate || '—';
  document.title = (m.title || '家具采购清单') + ' — 动态管理';

  const s = DATA.stats || {};
  anim('s-items', s.totalItems || 0);
  anim('s-orig', s.originalTotal || 0, '¥');
  anim('s-target', s.targetTotal || 0, '¥');
  anim('s-save', s.savedTotal || 0, '¥');

  renderFilter();
  renderProducts();
  renderPending();
  renderTimeline();
  renderPrices();
  renderSuggestions();
  observeAI();
}

function renderFilter() {
  const cats = [...new Set((DATA.products||[]).map(p => p.category))];
  const bar = document.getElementById('filterBar');
  bar.innerHTML = `<button class="fbtn on" data-f="all">全部</button>` + cats.map(c => `<button class="fbtn" data-f="${c}">${c}</button>`).join('');
  bar.querySelectorAll('.fbtn').forEach(b => {
    b.onclick = () => {
      bar.querySelectorAll('.fbtn').forEach(x => x.classList.remove('on'));
      b.classList.add('on');
      renderProducts(b.dataset.f);
    };
  });
}

function renderProducts(filter = 'all') {
  const items = filter === 'all' ? (DATA.products||[]) : (DATA.products||[]).filter(p => p.category === filter);
  const grid = document.getElementById('productGrid');
  if (!items.length) { grid.innerHTML = '<div class="empty"><h3>暂无数据</h3><p>请点击"刷新数据"按钮加载</p></div>'; return; }

  grid.innerHTML = items.map(p => {
    const save = p.originalPrice - p.targetPrice;
    const pct = p.originalPrice > 0 ? Math.round(save / p.originalPrice * 100) : 0;
    return `<div class="card ai">
      <div class="card-top"><span class="cat">${p.category}</span><span class="pri ${p.priority}">${priMap[p.priority]}优先</span></div>
      <div class="card-name">${p.name}</div>
      <div class="card-brand">${p.brand} · ${p.platform}</div>
      <div class="card-st">
        <span class="stag ${p.purchased?'done':''}"><span class="dot"></span> 已下单</span>
        <span class="stag ${p.received?'done':''}"><span class="dot"></span> 已收货</span>
      </div>
      <div class="card-prices">
        <span class="price">${fmt(p.targetPrice)}</span>
        ${p.originalPrice!==p.targetPrice?`<span class="price-orig">${fmt(p.originalPrice)}</span>`:''}
        ${save>0?`<span class="price-save">省 ${fmt(save)} (${pct}%)</span>`:''}
      </div>
      ${p.note?`<div class="card-note">${p.note}</div>`:''}
      ${p.link?`<a class="card-link" href="${p.link}" target="_blank" rel="noopener">去购买 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M17 7H7M17 7V17"/></svg></a>`:''}
    </div>`;
  }).join('');
  observeAI();
}

function renderPending() {
  document.getElementById('pendingGrid').innerHTML = (DATA.pendingItems||[]).map(p =>
    `<div class="pcard ai"><div class="picon">${p.icon||'📦'}</div><div class="ptitle">${p.category}</div><div class="pdesc">${p.description}</div></div>`
  ).join('');
}

function renderTimeline() {
  document.getElementById('timelineContent').innerHTML = Object.entries(DATA.timeline||{}).map(([g,items]) =>
    `<div class="tl-g ai"><div class="tl-gt">${g}</div>${items.map(i =>
      `<div class="tl-i"><div class="tl-dot"></div><div class="tl-c"><div class="tl-t">${i.name}</div>${i.note?`<div class="tl-n">${i.note}</div>`:''}</div></div>`
    ).join('')}</div>`
  ).join('');
}

function renderPrices() {
  document.getElementById('priceBody').innerHTML = (DATA.priceHistory||[]).map(r =>
    `<tr><td>${r.category}</td><td><strong>${r.model}</strong></td><td class="pc">${fmt(r.price)}</td><td>${r.source}</td><td>${r.note||'—'}</td></tr>`
  ).join('');
}

function renderSuggestions() {
  document.getElementById('suggestGrid').innerHTML = (DATA.suggestions||[]).map(s =>
    `<div class="scard ai"><span class="stag2 ${s.tag}">${s.tagLabel}</span><div class="stxt">${s.text}</div></div>`
  ).join('');
}

function renderEmpty() {
  document.getElementById('productGrid').innerHTML = `<div class="empty"><h3>📋 暂无数据</h3><p>请点击"刷新数据"按钮获取最新数据</p><button class="refresh-btn" onclick="refreshData()" style="font-size:15px;padding:10px 24px"><span class="icon">↻</span> 刷新数据</button></div>`;
}

// ========== Utils ==========
function observeAI() {
  const obs = new IntersectionObserver(es => { es.forEach(e => { if (e.isIntersecting) e.target.classList.add('vis'); }); }, {threshold:.1,rootMargin:'0px 0px -40px 0px'});
  document.querySelectorAll('.ai').forEach(el => obs.observe(el));
}

function anim(id, target, prefix='') {
  const el = document.getElementById(id); if (!el) return;
  const dur=1200, start=performance.now();
  const step = now => { const p=Math.min((now-start)/dur,1); el.textContent=prefix+Math.round(target*(1-Math.pow(1-p,3))).toLocaleString('zh-CN'); if(p<1)requestAnimationFrame(step); };
  requestAnimationFrame(step);
}

document.querySelectorAll('nav a[href^="#"]').forEach(a => { a.onclick = e => { e.preventDefault(); const t=document.querySelector(a.getAttribute('href')); if(t)t.scrollIntoView({behavior:'smooth',block:'start'}); }; });

// ========== Init ==========
loadData();
</script>
</body>
</html>
